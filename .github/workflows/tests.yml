name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Daily at 06:00 UTC. Catches deps drift (yt-dlp, curl_cffi, etc.).
    - cron: "0 6 * * *"
  workflow_dispatch:

# Cancel superseded runs on the same branch / PR so a quick push burst
# doesn't burn a fresh 3-version matrix per commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-test.txt

      # Tests mock every external boundary (subprocess, librosa, whisper,
      # ollama, openai, playwright, curl_cffi) and the runtime modules guard
      # those imports with try/except → None, so CI installs the minimal test
      # set instead of the full runtime stack. Cuts each job by ~750 MB and
      # several minutes vs installing requirements-dev.txt.
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run pytest
        run: pytest -v
